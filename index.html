<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navilan Architects | Launching Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: #111;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.container {
    max-width: 800px;
}

h1 {
    font-size: 48px;
    font-weight: 300;
    letter-spacing: 4px;
    margin-bottom: 10px;
}

.tagline {
    font-size: 18px;
    font-weight: 300;
    margin-bottom: 40px;
    color: #aaa;
}

.countdown {
    display: flex;
    justify-content: center;
    gap: 40px;
}

.time-box {
    font-size: 36px;
    font-weight: 600;
}

.label {
    font-size: 14px;
    color: #aaa;
    letter-spacing: 2px;
}

.footer {
    margin-top: 50px;
    font-size: 12px;
    color: #555;
}
</style>
</head>

<body>

<div class="container">
    <h1>NAVILAN ARCHITECTS</h1>
    <div class="tagline">Designing Spaces. Defining Futures.</div>

    <div class="countdown">
        <div>
            <div class="time-box" id="days">00</div>
            <div class="label">DAYS</div>
        </div>
        <div>
            <div class="time-box" id="hours">00</div>
            <div class="label">HOURS</div>
        </div>
        <div>
            <div class="time-box" id="minutes">00</div>
            <div class="label">MINUTES</div>
        </div>
        <div>
            <div class="time-box" id="seconds">00</div>
            <div class="label">SECONDS</div>
        </div>
    </div>

    <div class="footer">
        Website Launching on Sunday, 1 March 2026
    </div>
</div>

<script>
const launchDate = new Date("March 1, 2026 00:00:00").getTime();

const timer = setInterval(function() {
    const now = new Date().getTime();
    const distance = launchDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("days").innerHTML = days;
    document.getElementById("hours").innerHTML = hours;
    document.getElementById("minutes").innerHTML = minutes;
    document.getElementById("seconds").innerHTML = seconds;

    if (distance < 0) {
        clearInterval(timer);
        document.querySelector(".countdown").innerHTML = "WE ARE LIVE";
    }
}, 1000);
</script>

</body>
</html>
