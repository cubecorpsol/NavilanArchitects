<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <title>Decode Architects</title>
  <link rel="icon" type="img" href="logo.png">
  <link rel="stylesheet" href="stylesheet.css" />

  <style>
    /* Navigation base style (desktop) */
    #navigation > .nav-desktop {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 10px;
    }

    #li {
      margin: 10px;
      font-weight: bold;
      color: black;
    }

    .active {
      color: red !important;
    }

    #lg {
      margin-left: auto;
    }

    /* Hide hamburger and mobile nav in desktop */
    .hamburger,
    .mobile-nav {
      display: none;
    }

    #map p {
      line-height: 1.6;
    }

    /* === DESKTOP & TABLET FLEX UPDATE (NO LAYOUT CHANGE) === */
    @media (min-width: 769px) {
      #map {
        display: flex;
        flex-direction: row;
        align-items: flex-start;
        gap: 2vw; /* Responsive gap */
        padding: 2vw 5vw; /* Responsive padding */
      }

      #map iframe {
        flex-shrink: 0;
        width: 60vw; /* Responsive width */
        max-width: 900px;
        height: 450px;
      }

      #map p {
        text-align: center;
        margin-left: auto;
        margin-right: 10px;
        position: relative;
      }

      #map span#bold {
        display: block;
        text-align: center;
        font-weight: bold;
        margin-bottom: 10px;
        margin-left: auto;
        margin-right: auto;
      }

      .cube {
        text-decoration: none;
        margin-left: 25%;
      }

      footer {
        margin-left: 25%;
      }

      #icon {
        margin-left: 25%;
        margin-top: 20px;
      }
    }

    /* === MOBILE ONLY STYLES === */
    @media (max-width: 768px) {
      #navigation > .nav-desktop {
        display: none;
      }

      .cube {
        text-decoration: none;
        font-size: 12px;
        margin-left: 25%;
        margin-top: -2%;
      }

      #footer {
        margin-left: 20%;
      }

      .hamburger {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        width: 30px;
        height: 25px;
        margin: auto;
        margin-top: 10px;
      }

      .hamburger div {
        width: 25px;
        height: 3px;
        background-color: black;
        margin: 3px 0;
      }

      .mobile-nav {
        display: none;
        flex-direction: column;
        align-items: center;
        background-color: white;
        padding: 10px;
      }

      .mobile-nav a {
        text-decoration: none;
        margin: 5px 0;
        font-weight: bold;
        color: black;
      }

      .mobile-nav a.active {
        color: red !important;
      }

      .mobile-nav.show {
        display: flex;
      }

      #map {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      #map > div {
        margin: 20px 10px;
        text-align: center;
      }

      #map p {
        margin: 10px auto;
        text-align: center;
      }

      iframe {
        width: 100% !important;
        height: auto;
      }
    }
  </style>

  <script>
    function toggleMenu() {
      const nav = document.getElementById("mobileNav");
      nav.classList.toggle("show");
    }
  </script>
</head>
