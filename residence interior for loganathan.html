<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <link rel="stylesheet" href="stylesheet.css">

  <style>
    /* MOBILE ONLY */
    @media (max-width: 768px) {
      #navigation > div {
        display: none;
      }

      #hamburger {
        display: block;
        text-align: center;
        font-size: 30px;
        padding: 10px 0;
        cursor: pointer;
      }

      #mobile-menu {
        display: none;
        flex-direction: column;
        align-items: center;
        background-color: white;
        width: 100%;
      }

      #mobile-menu.show {
        display: flex;
      }

      #mobile-menu a {
        text-decoration: none;
        color: black;
        font-weight: bold;
        padding: 10px;
      }

      #mobile-menu a.active {
        color: red;
      }

      .mobile-images {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .mobile-images img {
        width: 90%;
        height: auto;
        margin: 10px 0;
      }
    }

    /* DESKTOP ONLY */
    @media (min-width: 769px) {
      #hamburger,
      #mobile-menu {
        display: none;
      }

      #navigation > div {
        display: flex;
        align-items: center;
        margin-left: 35px;
        margin-top: 20px;
      }

      #li {
        margin-right: 30px;
        font-weight: bold;
      }

      #lg {
        margin-left: auto;
        margin-right: 40px;
      }

      #show {
        margin: 15px;
      }
    }
  </style>

  <script>
    function toggleMenu() {
      var menu = document.getElementById("mobile-menu");
      menu.classList.toggle("show");
    }
  </script>
</head>
