<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <link rel="stylesheet" href="stylesheet.css" />

  <style>
    /* --- Mobile Styles --- */
    @media (max-width: 768px) {
      #navigation > div {
        display: none;
      }

      #hamburger {
        display: block;
        font-size: 30px;
        text-align: center;
        cursor: pointer;
        padding: 10px 0;
      }

      #mobile-menu {
        display: none;
        flex-direction: column;
        align-items: center;
        background-color: white;
      }

      #mobile-menu.show {
        display: flex;
      }

      #mobile-menu a {
        text-decoration: none;
        color: black;
        padding: 10px 0;
        font-weight: bold;
      }

      #mobile-menu a.active {
        color: red;
      }

      #image-container {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      #image-container img {
        width: 90%;
        height: auto;
        margin: 10px 0;
      }
    }

    /* --- Desktop Styles (original layout preserved) --- */
    @media (min-width: 769px) {
      #hamburger,
      #mobile-menu {
        display: none;
      }

      #navigation > div {
        display: flex;
        align-items: center;
        margin-top: 20px;
        margin-left: 35px;
      }

      #li {
        margin-right: 30px;
        font-weight: bold;
      }

      #lg {
        margin-left: auto;
        margin-right: 40px;
      }

      #image-container {
        margin-left: 35px;
        margin-top: 50px;
      }

      #show {
        margin-right: 15px;
      }
    }
  </style>

  <script>
    function toggleMenu() {
      var menu = document.getElementById("mobile-menu");
      menu.classList.toggle("show");
    }
  </script>
</head>

<body class="show">

  <!-- Desktop Navigation -->
  <section id="navigation">
    <div>
      <a href="homepage.html"><div id="li">DECODE</div></a>
      <a href="Work.html"><div id="li" style="color: red;">WORK</div></a>
      <a href="STUDIO.html"><div id="li">STUDIO</div></a>
      <a href="Get in touch.html"><div id="li">GET IN TOUCH</div></a>
      <div id="lg"><img src="logoblack.png" height="39px" width="50px" /></div>
    </div>
  </section>

  <!-- Mobile Hamburger -->
  <div id="hamburger" onclick="toggleMenu()">☰</div>

  <!-- Mobile Navigation Menu -->
  <div id="mobile-menu">
    <a href="homepage.html">DECODE</a>
    <a href="Work.html" class="active">WORK</a>
    <a href="STUDIO.html">STUDIO</a>
    <a href="Get in touch.html">GET IN TOUCH</a>
  </div>

  <!-- Image Content -->
  <div id="image-container">
    <img id="show" src="09-Proposed Interior for Mr.Selvakumar/01.jpg" height="400px" width="400px">
    <img id="show" src="09-Proposed Interior for Mr.Selvakumar/2.jpg" height="400px" width="400px">
    <img id="show" src="09-Proposed Interior for Mr.Selvakumar/3.jpg" height="400px" width="400px">
    <img id="show" src="09-Proposed Interior for Mr.Selvakumar/4.jpg" height="400px" width="400px">
    <img id="show" src="09-Proposed Interior for Mr.Selvakumar/5.jpg" height="400px" width="400px">
  </div>

</body>
</html>
