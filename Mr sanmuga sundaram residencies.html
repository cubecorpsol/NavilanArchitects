<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WORK</title>
  <link rel="stylesheet" href="stylesheet.css" />

  <style>
    /* Desktop layout */
    #navigation > div {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      padding: 10px;
    }

    #li {
      margin-right: 20px;
      font-weight: bold;
      text-decoration: none;
    }

    #lg {
      margin-left: auto;
    }

    #hamburger {
      display: none;
    }

    #mobile-menu {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 10px 0;
    }

    /* Desktop image layout */
    #image-container img {
      height: 400px;
      width: 400px;
      margin: 10px;
    }

    /* === Mobile Layout === */
    @media (max-width: 768px) {
      #navigation > div {
        display: none;
      }

      #hamburger {
        display: block;
        text-align: center;
        font-size: 30px;
        cursor: pointer;
        width: 100%;
        padding: 10px 0;
      }

      #mobile-menu.show {
        display: flex;
      }

      #mobile-menu a {
        text-decoration: none;
        color: black;
        padding: 10px 0;
        display: block;
        width: 100%;
        text-align: center;
      }

      #mobile-menu a.active {
        color: red;
      }

      #image-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-bottom: 20px;
      }

      #image-container img {
        width: 90%;
        height: auto;
        margin: 10px 0;
      }
    }
  </style>

  <script>
    function toggleMenu() {
      var menu = document.getElementById("mobile-menu");
      menu.classList.toggle("show");
    }
  </script>
</head>

<body class="show">

  <!-- Desktop Navigation -->
  <section id="navigation">
    <div>
      <a href="homepage.html"><div id="li">DECODE</div></a>
      <a href="Work.html"><div id="li" style="color: red;">WORK</div></a>
      <a href="STUDIO.html"><div id="li">STUDIO</div></a>
      <a href="Get in touch.html"><div id="li">GET IN TOUCH</div></a>
      <div id="lg"><img src="logoblack.png" height="39px" width="50px" /></div>
    </div>
  </section>

  <!-- Mobile Hamburger Icon -->
  <div id="hamburger" onclick="toggleMenu()">☰</div>

  <!-- Mobile Navigation -->
  <div id="mobile-menu">
    <a href="homepage.html">DECODE</a>
    <a href="Work.html" class="active">WORK</a>
    <a href="STUDIO.html">STUDIO</a>
    <a href="Get in touch.html">GET IN TOUCH</a>
  </div>

  <!-- Image Section -->
  <div id="image-container">
    <img id="show" src="Mr sanmuga sundaram residence/01.jpg" />
    <img id="show" src="Mr sanmuga sundaram residence/2.jpg" />
    <img id="show" src="Mr sanmuga sundaram residence/3.jpg" />
    <img id="show" src="Mr sanmuga sundaram residence/4.jpg" />
    <img id="show" src="Mr sanmuga sundaram residence/5.jpg" />
  </div>

</body>
</html>
