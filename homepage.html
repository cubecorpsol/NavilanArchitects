<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Navilan Architects</title>
    <link rel="icon" type="img" href="logo.png">
  <link rel="stylesheet" href="stylesheet.css" />

  <style>
    body {
      margin: 0;
      padding: 0;
      color: white;
      font-family: sans-serif;
      text-shadow: 1px 1px 4px black;
      overflow: hidden;
    }

    .slideshow {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .slide {
      position: absolute;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      opacity: 0;
      animation: fade 15s infinite;
      transition: opacity 1s ease-in-out;
    }

    @keyframes fade {
      0%   { opacity: 1; }
      30%  { opacity: 1; }
      40%  { opacity: 0; }
      100% { opacity: 0; }
    }

    .slide:nth-child(1) {
      background-image: url('hp.jpg');
      animation-delay: 0s;
    }

    .slide:nth-child(2) {
      background-image: url('hp2.jpg');
      animation-delay: 5s;
    }

    .slide:nth-child(3) {
      background-image: url('hp3.jpg');
      animation-delay: 10s;
    }

    #fpinfo {
      margin-top: 17%;
      margin-left: 35px;
      color: #F0F8FF;
      text-align: left;
    }

    #fpinfo img {
      width: 52px;
      height: 39px;
    }

    #work {
      margin-left: 35px;
      margin-top: 12%;
      height: 25px;
      width: 200px;
      background: #F0F8FF;
      color: black;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
    }

    #fpicon {
      margin-top: 20px;
      margin-left: 35px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    #fpicon svg {
      width: 36px;
      height: 36px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      #fpinfo {
        margin-top: 10%;
        margin-left: 20px;
        font-size: 14px;
      }

      #fpinfo img {
        width: 40px;
        height: 30px;
      }

      #work {
        margin-left: 20px;
        margin-top: 20px; /* Reduced space between fpinfo and fpicon */
        height: 40px;
        width: 160px;
        font-size: 14px;
      }

      #fpicon {
        margin-left: 20px;
        margin-top: 30px;
        gap: 8px;
      }

      #fpicon svg {
        width: 30px;
        height: 30px;
      }
    }

    @media (max-width: 480px) {
      #fpinfo {
        margin-top: 8%;
        font-size: 12px;
      }

      #fpinfo img {
        width: 36px;
        height: 28px;
      }

      #work {
        width: 140px;
        height: 36px;
        font-size: 13px;
        margin-top: 20px; /* Reduced gap */
        margin-left: 20px;
      }

      #fpicon {
        margin-top: 35px;
        margin-left: 20px;
      }

      #fpicon svg {
        width: 26px;
        height: 26px;
      }

      #mobilecenter {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        height: 100vh;
        padding-left: 20px;
        box-sizing: border-box;
      }
    }
  </style>
</head>

<body id="Homepage">
