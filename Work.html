    /* DARK HOVER EFFECT + CENTERED TITLE */
    .img-hover {
      position: relative;
      display: inline-block;
      overflow: hidden;
    }

    .img-hover img {
      display: block;
      width: 100%;
      height: auto;
      transition: 0.3s ease;
    }

    .img-hover::after {
      content: "";
      position: absolute;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.4);
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 1;
    }

    .img-hover::before {
      content: attr(title);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 2;
      pointer-events: none;
    }

    .img-hover:hover::before,
    .img-hover:hover::after {
      opacity: 1;
    }
